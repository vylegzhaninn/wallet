spring:
  application:
    name: wallet

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop   # автоматически создаст таблицы
    show-sql: true

  Liquibase:
    enabled: false